<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Волна — социальная сеть</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0d0f14;
    --card: #161b25;
    --card2: #1e2535;
    --accent: #5b8dee;
    --accent2: #7c5bf0;
    --green: #3ecf8e;
    --text: #e8eaf0;
    --muted: #7a849a;
    --border: #2a3045;
    --danger: #e05c5c;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Unbounded', cursive;
    font-size: 1.3rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #headerRight {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #userAvatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    object-fit: cover;
    display: none;
  }

  #userName {
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--text);
  }

  /* ── TABS ── */
  #tabs {
    display: none;
    gap: 4px;
    background: var(--card2);
    border-radius: 10px;
    padding: 4px;
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* ── MAIN ── */
  main {
    width: 100%;
    max-width: 600px;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── LOGIN ── */
  #loginScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    gap: 24px;
    text-align: center;
  }

  #loginScreen .logo-big {
    font-family: 'Unbounded', cursive;
    font-size: 2.4rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #loginScreen p {
    color: var(--muted);
    max-width: 300px;
    font-size: 1rem;
  }

  .btn-google {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fff;
    color: #333;
    border: none;
    padding: 13px 28px;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .btn-google:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(0,0,0,0.4); }

  .btn-google svg { width: 20px; height: 20px; }

  /* ── FEED PAGE ── */
  #feedPage, #dmPage { display: none; flex-direction: column; gap: 16px; }

  /* ── POST FORM ── */
  .post-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  textarea, input[type="text"] {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    padding: 12px 14px;
    resize: none;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus, input[type="text"]:focus { border-color: var(--accent); }

  .form-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn-icon {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    border-radius: 10px;
    padding: 10px 22px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    margin-left: auto;
    transition: opacity 0.2s, transform 0.15s;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

  .btn-danger {
    background: var(--danger);
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-danger:hover { opacity: 0.8; }

  #imagePreview {
    display: none;
    position: relative;
  }

  #imagePreview img {
    width: 100%;
    border-radius: 10px;
    max-height: 300px;
    object-fit: cover;
  }

  #removeImg {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(0,0,0,0.7);
    border: none;
    color: #fff;
    border-radius: 50%;
    width: 28px; height: 28px;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  input[type="file"] { display: none; }

  /* ── POST CARD ── */
  .post-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .post-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .post-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 2px solid var(--border);
    object-fit: cover;
  }

  .post-meta { flex: 1; }
  .post-name { font-weight: 700; font-size: 0.9rem; }
  .post-time { color: var(--muted); font-size: 0.78rem; }

  .post-text { font-size: 0.95rem; line-height: 1.6; margin-bottom: 10px; white-space: pre-wrap; }

  .post-img {
    width: 100%;
    border-radius: 10px;
    margin-top: 6px;
    cursor: zoom-in;
  }

  .post-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .action-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.2s;
  }

  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.liked { border-color: #e05c8e; color: #e05c8e; background: rgba(224,92,142,0.1); }

  /* ── DM PAGE ── */
  #dmPage {
    flex-direction: row;
    gap: 16px;
    align-items: flex-start;
  }

  #userList {
    width: 200px;
    min-width: 160px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    flex-shrink: 0;
  }

  #userList h3 {
    padding: 14px 16px;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  .user-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    font-size: 0.88rem;
    font-weight: 600;
  }

  .user-item:hover { background: var(--card2); }
  .user-item.active { background: rgba(91,141,238,0.15); color: var(--accent); }

  .user-item img {
    width: 30px; height: 30px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--border);
  }

  #chatPanel {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    min-height: 500px;
    overflow: hidden;
  }

  #chatHeader {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--muted);
  }

  #chatHeader span { color: var(--text); }

  #chatBox {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 350px;
    max-height: 450px;
  }

  .msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 0.9rem;
    line-height: 1.5;
    word-break: break-word;
    animation: fadeIn 0.2s ease;
  }

  .msg img {
    max-width: 100%;
    border-radius: 10px;
    margin-top: 6px;
    display: block;
  }

  .msg.mine {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .msg.theirs {
    background: var(--card2);
    color: var(--text);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }

  #chatInputArea {
    padding: 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #chatInputArea textarea {
    flex: 1;
    max-height: 120px;
    overflow-y: auto;
  }

  #chatInputArea .btn-icon { padding: 10px 12px; font-size: 1rem; }

  #chatEmpty {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--muted);
    font-size: 0.9rem;
    padding: 40px;
    text-align: center;
  }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 999;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }

  #lightbox.open { display: flex; }

  #lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 10px;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #fff;
    padding: 10px 22px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 0.88rem;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 500;
  }

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 500px) {
    #dmPage { flex-direction: column; }
    #userList { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>Волна</h1>
  <div id="headerRight">
    <div id="tabs" style="display:none;">
      <button class="tab-btn active" data-tab="feed">🌊 Лента</button>
      <button class="tab-btn" data-tab="dm">💬 Сообщения</button>
    </div>
    <img id="userAvatar" src="" alt="avatar">
    <span id="userName"></span>
    <button id="logoutBtn" style="display:none;" class="btn-danger">Выйти</button>
  </div>
</header>

<main>

  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="logo-big">Волна</div>
    <p>Делитесь моментами. Общайтесь с людьми. Будьте на волне.</p>
    <button class="btn-google" id="loginBtn">
      <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.5 15.1 18.9 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.6 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 10-1.9 13.6-5l-6.3-5.2C29.5 35.3 26.9 36 24 36c-5.2 0-9.5-2.9-11.3-7.1l-6.5 5C9.6 39.5 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.8l6.3 5.2C41.3 35.6 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
      Войти через Google
    </button>
  </div>

  <!-- FEED -->
  <div id="feedPage">
    <div class="post-form">
      <textarea id="postText" rows="3" placeholder="Что у вас нового?"></textarea>
      <div id="imagePreview">
        <img id="previewImg" src="" alt="">
        <button id="removeImg">✕</button>
      </div>
      <div class="form-row">
        <label class="btn-icon" for="imageInput" title="Прикрепить фото">📷 Фото</label>
        <input type="file" id="imageInput" accept="image/*">
        <button class="btn-primary" id="publishBtn">Опубликовать</button>
      </div>
    </div>
    <div id="feedList"></div>
  </div>

  <!-- DM -->
  <div id="dmPage">
    <div id="userList">
      <h3>Пользователи</h3>
      <div id="userItems"></div>
    </div>
    <div id="chatPanel">
      <div id="chatHeader">💬 <span id="chatWithName">Выберите собеседника</span></div>
      <div id="chatBox">
        <div id="chatEmpty">👆 Выберите пользователя слева, чтобы начать чат</div>
      </div>
      <div id="chatInputArea" style="display:none;">
        <label class="btn-icon" for="dmImageInput" title="Фото">📷</label>
        <input type="file" id="dmImageInput" accept="image/*">
        <textarea id="msgInput" rows="1" placeholder="Написать сообщение..."></textarea>
        <button class="btn-primary" id="sendBtn" style="width:auto; padding: 10px 16px;">→</button>
      </div>
    </div>
  </div>

</main>

<!-- LIGHTBOX -->
<div id="lightbox">
  <img id="lightboxImg" src="" alt="">
</div>

<!-- TOAST -->
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import {
  getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

// ── Firebase config ──
const firebaseConfig = {
  apiKey: "AIzaSyCh90XrGHx08ElQ5hsUN4SXZOnVJTSwzVo",
  authDomain: "myproject-4f292.firebaseapp.com",
  projectId: "myproject-4f292",
  storageBucket: "myproject-4f292.firebasestorage.app",
  messagingSenderId: "715831246395",
  appId: "1:715831246395:web:f0b253fdcd64ec9199a61e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// ── State ──
let currentUser = null;
let currentChatUid = null;
let currentChatName = null;
let dmUnsubscribe = null;
let allUsers = {};       // uid -> {displayName, photoURL}
let likedPosts = new Set();

// ── Tabs ──
let activeTab = "feed";

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("feedPage").style.display = activeTab === "feed" ? "flex" : "none";
    document.getElementById("dmPage").style.display  = activeTab === "dm"   ? "flex" : "none";
    if (activeTab === "dm") loadUsers();
  });
});

// ── Auth ──
document.getElementById("loginBtn").onclick = () => signInWithPopup(auth, provider);
document.getElementById("logoutBtn").onclick = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;

    // Save user profile to Firestore
    await setDoc(doc(db, "users", user.uid), {
      displayName: user.displayName,
      photoURL: user.photoURL || "",
      uid: user.uid
    }, { merge: true });

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("feedPage").style.display = "flex";
    document.getElementById("dmPage").style.display = "none";
    document.getElementById("tabs").style.display = "flex";
    document.getElementById("logoutBtn").style.display = "block";
    document.getElementById("userAvatar").src = user.photoURL || "";
    document.getElementById("userAvatar").style.display = "block";
    document.getElementById("userName").textContent = user.displayName;

    loadFeed();
  } else {
    currentUser = null;
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("feedPage").style.display = "none";
    document.getElementById("dmPage").style.display = "none";
    document.getElementById("tabs").style.display = "none";
    document.getElementById("logoutBtn").style.display = "none";
    document.getElementById("userAvatar").style.display = "none";
    document.getElementById("userName").textContent = "";
  }
});

// ── Helpers ──
function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.readAsDataURL(file);
    r.onload = () => res(r.result);
    r.onerror = rej;
  });
}

function timeAgo(ts) {
  if (!ts) return "";
  const diff = Math.floor((Date.now() - ts.toMillis()) / 1000);
  if (diff < 60) return "только что";
  if (diff < 3600) return `${Math.floor(diff/60)} мин назад`;
  if (diff < 86400) return `${Math.floor(diff/3600)} ч назад`;
  return `${Math.floor(diff/86400)} д назад`;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ── Image Preview ──
let selectedImageBase64 = "";

document.getElementById("imageInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2_000_000) { alert("Файл слишком большой! Максимум 2MB"); return; }
  selectedImageBase64 = await toBase64(file);
  document.getElementById("previewImg").src = selectedImageBase64;
  document.getElementById("imagePreview").style.display = "block";
});

document.getElementById("removeImg").onclick = () => {
  selectedImageBase64 = "";
  document.getElementById("imageInput").value = "";
  document.getElementById("previewImg").src = "";
  document.getElementById("imagePreview").style.display = "none";
};

// ── Publish Post ──
document.getElementById("publishBtn").onclick = async () => {
  const text = document.getElementById("postText").value.trim();
  if (!text && !selectedImageBase64) { alert("Добавьте текст или изображение!"); return; }

  await addDoc(collection(db, "posts"), {
    text,
    image: selectedImageBase64,
    authorUid: currentUser.uid,
    authorName: currentUser.displayName,
    authorPhoto: currentUser.photoURL || "",
    timestamp: serverTimestamp(),
    likes: 0
  });

  document.getElementById("postText").value = "";
  document.getElementById("removeImg").click();
  showToast("Опубликовано! 🎉");
};

// ── Feed ──
function loadFeed() {
  const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
  onSnapshot(q, (snapshot) => {
    const list = document.getElementById("feedList");
    list.innerHTML = "";
    snapshot.forEach(docItem => {
      const d = docItem.data();
      const id = docItem.id;
      const isLiked = likedPosts.has(id);
      const div = document.createElement("div");
      div.className = "post-card";
      div.innerHTML = `
        <div class="post-header">
          <img class="post-avatar" src="${d.authorPhoto || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(d.authorName) + '&background=5b8dee&color=fff'}" alt="">
          <div class="post-meta">
            <div class="post-name">${escHtml(d.authorName)}</div>
            <div class="post-time">${timeAgo(d.timestamp)}</div>
          </div>
        </div>
        ${d.text ? `<div class="post-text">${escHtml(d.text)}</div>` : ""}
        ${d.image ? `<img class="post-img" src="${d.image}" alt="" onclick="openLightbox('${id}')">` : ""}
        <div class="post-actions">
          <button class="action-btn ${isLiked ? 'liked' : ''}" data-id="${id}" data-liked="${isLiked}">
            ${isLiked ? '❤️' : '🤍'} Нравится
          </button>
          ${d.authorUid !== currentUser.uid ? `<button class="action-btn dm-btn" data-uid="${d.authorUid}" data-name="${escHtml(d.authorName)}">💬 Написать</button>` : ""}
        </div>
      `;
      list.appendChild(div);
    });

    // Store images for lightbox
    window._postImages = {};
    snapshot.forEach(docItem => {
      if (docItem.data().image) window._postImages[docItem.id] = docItem.data().image;
    });

    // Like buttons
    list.querySelectorAll(".action-btn[data-liked]").forEach(btn => {
      btn.addEventListener("click", () => {
        const postId = btn.dataset.id;
        if (likedPosts.has(postId)) {
          likedPosts.delete(postId);
        } else {
          likedPosts.add(postId);
        }
        // Re-render (onSnapshot will update)
        const isNowLiked = likedPosts.has(postId);
        btn.classList.toggle("liked", isNowLiked);
        btn.textContent = (isNowLiked ? "❤️" : "🤍") + " Нравится";
        btn.dataset.liked = isNowLiked;
      });
    });

    // DM buttons
    list.querySelectorAll(".dm-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        // Switch to DM tab and open chat
        activeTab = "dm";
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelector('.tab-btn[data-tab="dm"]').classList.add("active");
        document.getElementById("feedPage").style.display = "none";
        document.getElementById("dmPage").style.display = "flex";
        loadUsers().then(() => openChat(btn.dataset.uid, btn.dataset.name));
      });
    });
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Lightbox ──
window.openLightbox = (id) => {
  const src = window._postImages?.[id];
  if (!src) return;
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightbox").classList.add("open");
};
document.getElementById("lightbox").onclick = () => document.getElementById("lightbox").classList.remove("open");

// ── DM: Load Users ──
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  const items = document.getElementById("userItems");
  items.innerHTML = "";
  allUsers = {};
  snap.forEach(docItem => {
    const u = docItem.data();
    if (u.uid === currentUser.uid) return;
    allUsers[u.uid] = u;
    const div = document.createElement("div");
    div.className = "user-item" + (u.uid === currentChatUid ? " active" : "");
    div.dataset.uid = u.uid;
    div.dataset.name = u.displayName;
    div.innerHTML = `
      <img src="${u.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(u.displayName) + '&background=5b8dee&color=fff'}" alt="">
      ${escHtml(u.displayName)}
    `;
    div.addEventListener("click", () => openChat(u.uid, u.displayName));
    items.appendChild(div);
  });
}

function openChat(uid, name) {
  if (dmUnsubscribe) dmUnsubscribe();
  currentChatUid = uid;
  currentChatName = name;

  document.querySelectorAll(".user-item").forEach(el => {
    el.classList.toggle("active", el.dataset.uid === uid);
  });

  document.getElementById("chatWithName").textContent = name;
  document.getElementById("chatInputArea").style.display = "flex";
  document.getElementById("chatEmpty").style.display = "none";

  // Chat ID is sorted UIDs so it's consistent for both parties
  const chatId = [currentUser.uid, uid].sort().join("_");

  const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp"));
  dmUnsubscribe = onSnapshot(q, (snap) => {
    const box = document.getElementById("chatBox");
    box.innerHTML = "";
    snap.forEach(docItem => {
      const d = docItem.data();
      const div = document.createElement("div");
      div.className = "msg " + (d.from === currentUser.uid ? "mine" : "theirs");
      if (d.text) div.innerHTML = escHtml(d.text).replace(/\n/g, "<br>");
      if (d.image) {
        const img = document.createElement("img");
        img.src = d.image;
        img.onclick = () => {
          document.getElementById("lightboxImg").src = d.image;
          document.getElementById("lightbox").classList.add("open");
        };
        img.style.cursor = "zoom-in";
        div.appendChild(img);
      }
      box.appendChild(div);
    });
    box.scrollTop = box.scrollHeight;
  });
}

// ── DM: Send Message ──
let dmImageBase64 = "";

document.getElementById("dmImageInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2_000_000) { alert("Файл слишком большой!"); return; }
  dmImageBase64 = await toBase64(file);
  showToast("Фото прикреплено 📷");
});

async function sendMessage() {
  if (!currentChatUid) return;
  const text = document.getElementById("msgInput").value.trim();
  if (!text && !dmImageBase64) return;

  const chatId = [currentUser.uid, currentChatUid].sort().join("_");

  await addDoc(collection(db, "chats", chatId, "messages"), {
    from: currentUser.uid,
    to: currentChatUid,
    text: text || "",
    image: dmImageBase64 || "",
    timestamp: serverTimestamp()
  });

  document.getElementById("msgInput").value = "";
  dmImageBase64 = "";
  document.getElementById("dmImageInput").value = "";
}

document.getElementById("sendBtn").onclick = sendMessage;

document.getElementById("msgInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
