<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Облачное приложение</title>
<link rel="icon" href="data:,">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f7f6;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 500px;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  background: #007bff;
  color: white;
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 6px;
  cursor: pointer;
}

.post {
  background: white;
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
  width: 100%;
  max-width: 500px;
}

.post img {
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>
<body>

<div class="container">
  <button id="loginBtn">Войти через Google</button>
  <button id="logoutBtn" style="display:none;">Выйти</button>
</div>

<div class="container" id="form" style="display:none;">
  <input type="text" id="content" placeholder="Что у вас нового?">
  <input type="file" id="imageInput" accept="image/*">
  <button id="mainBtn">Опубликовать</button>
</div>

<div id="feed"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh90XrGHx08ElQ5hsUN4SXZOnVJTSwzVo",
  authDomain: "myproject-4f292.firebaseapp.com",
  projectId: "myproject-4f292",
  storageBucket: "myproject-4f292.firebasestorage.app",
  messagingSenderId: "715831246395",
  appId: "1:715831246395:web:f0b253fdcd64ec9199a61e",
  measurementId: "G-6E10ED09KQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const form = document.getElementById("form");

loginBtn.onclick = () => signInWithPopup(auth, provider);
logoutBtn.onclick = () => signOut(auth);
  let currentUser = null
let currentChatUser = null

const chatContainer = document.getElementById("chatContainer")
const profile = document.getElementById("profile")

onAuthStateChanged(auth,(user)=>{

if(user){

currentUser = user

profile.innerHTML = `
<b>${user.displayName}</b>
`

loginBtn.style.display="none"
logoutBtn.style.display="block"
chatContainer.style.display="block"

}else{

loginBtn.style.display="block"
logoutBtn.style.display="none"
chatContainer.style.display="none"

}

})

document.getElementById("userSelect").onchange = () => {

currentChatUser = document.getElementById("userSelect").value

document.getElementById("chatWith").innerHTML =
`Чат с: <b>${currentChatUser}</b>`

loadMessages()

}

document.getElementById("sendBtn").onclick = async ()=>{

const text = document.getElementById("msgInput").value

if(!text) return

await addDoc(collection(db,"messages"),{

from:currentUser.displayName,
to:currentChatUser,
text:text,
timestamp:serverTimestamp()

})

document.getElementById("msgInput").value=""

}

function loadMessages(){

const q = query(
collection(db,"messages"),
orderBy("timestamp")
)

onSnapshot(q,(snapshot)=>{

const box = document.getElementById("chatBox")
box.innerHTML=""

snapshot.forEach(doc=>{

const data = doc.data()

if(
(data.from===currentUser.displayName && data.to===currentChatUser) ||
(data.from===currentChatUser && data.to===currentUser.displayName)
){

const div = document.createElement("div")

div.className =
data.from===currentUser.displayName
? "message my"
: "message other"

div.innerText=data.text

box.appendChild(div)

}

})

box.scrollTop=box.scrollHeight

})

}

onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBtn.style.display = "none";
    logoutBtn.style.display = "block";
    form.style.display = "block";
  } else {
    loginBtn.style.display = "block";
    logoutBtn.style.display = "none";
    form.style.display = "none";
  }
});

// 📌 Конвертация картинки в base64
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

document.getElementById("mainBtn").onclick = async () => {

  const content = document.getElementById("content").value;
  const file = document.getElementById("imageInput").files[0];

  if (!content && !file)
    return alert("Добавьте текст или изображение!");

  let imageBase64 = "";

  if (file) {
    if (file.size > 800000) {
      return alert("Картинка слишком большая! Максимум ~800KB");
    }
    imageBase64 = await toBase64(file);
  }

  await addDoc(collection(db, "requests"), {
    text: content,
    image: imageBase64,
    timestamp: serverTimestamp()
  });

  document.getElementById("content").value = "";
  document.getElementById("imageInput").value = "";
};

const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  snapshot.forEach((docItem) => {
    const data = docItem.data();

    feed.innerHTML += `
      <div class="post">
        <p>${data.text || ""}</p>
        ${data.image ? `<img src="${data.image}">` : ""}
      </div>
    `;
  });
});

</script>
</body>
</html>
