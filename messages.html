<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaaS — Messages</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0f11;
            --surface: #16181c;
            --border: #2a2d35;
            --accent: #5b6af0;
            --accent-glow: rgba(91,106,240,0.25);
            --red: #e05b5b;
            --red-glow: rgba(224,91,91,0.2);
            --green: #4ecb8d;
            --text: #e8eaf0;
            --muted: #666b7e;
            --msg-out: #5b6af0;
            --msg-in: #1e2028;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px 60px;
            gap: 20px;
        }

        header {
            width: 100%;
            max-width: 860px;
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-family: 'Space Mono', monospace;
            font-size: 22px;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        header span {
            font-size: 11px;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
        }

        .panel {
            width: 100%;
            max-width: 860px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .panel-title {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 14px;
        }

        button {
            padding: 11px 18px;
            border-radius: 7px;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
        }

        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── AUTH ── */
        .auth-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .user-name { font-weight: 600; font-size: 14px; flex: 1; }

        #loginBtn {
            flex: 1;
            background: #fff;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            padding: 11px 18px;
        }
        #loginBtn:hover { box-shadow: 0 0 14px rgba(255,255,255,0.1); }
        #loginBtn svg { flex-shrink: 0; }

        #logoutBtn {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 8px 14px;
            font-size: 12px;
        }
        #logoutBtn:hover { background: var(--red-glow); border-color: var(--red); color: var(--red); }

        /* ── MESSENGER LAYOUT ── */
        .messenger {
            width: 100%;
            max-width: 860px;
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            height: 600px;
        }

        .messenger-inner {
            display: flex;
            height: 100%;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .sidebar-search {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-search input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
        }

        .sidebar-search input:focus { border-color: var(--accent); }
        .sidebar-search input::placeholder { color: var(--muted); }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
        }

        .contacts-list::-webkit-scrollbar { width: 4px; }
        .contacts-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            position: relative;
        }

        .contact-item:hover { background: rgba(91,106,240,0.05); }
        .contact-item.active { background: rgba(91,106,240,0.12); border-left: 2px solid var(--accent); }

        .contact-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .contact-avatar-placeholder {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .contact-info { flex: 1; min-width: 0; }
        .contact-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-preview { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

        .unread-badge {
            background: var(--accent);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .no-contacts {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
        }

        /* NEW CHAT */
        .new-chat-btn {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }

        .new-chat-btn button {
            width: 100%;
            background: rgba(91,106,240,0.15);
            color: var(--accent);
            border: 1px solid rgba(91,106,240,0.3);
            padding: 9px;
            font-size: 12px;
        }

        .new-chat-btn button:hover { background: rgba(91,106,240,0.25); }

        /* CHAT AREA */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .chat-header-placeholder {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
        }

        .chat-header-name { font-weight: 600; font-size: 14px; flex: 1; }
        .chat-header-email { font-size: 11px; color: var(--muted); }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .msg-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-bubble.out {
            background: var(--msg-out);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-bubble.in {
            background: var(--msg-in);
            color: var(--text);
            border: 1px solid var(--border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
            font-family: 'Space Mono', monospace;
        }

        .msg-bubble.in .msg-time { text-align: left; }

        .chat-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
        }

        .chat-empty span { font-family: 'Space Mono', monospace; font-size: 11px; display: block; margin-top: 6px; opacity: 0.6; }

        .no-chat-selected {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            color: var(--muted);
        }

        .no-chat-selected .icon { font-size: 40px; opacity: 0.3; }
        .no-chat-selected p { font-size: 13px; }

        /* INPUT */
        .chat-input-bar {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .chat-input-bar input {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-bar input:focus { border-color: var(--accent); }
        .chat-input-bar input::placeholder { color: var(--muted); }

        #sendBtn {
            background: var(--accent);
            color: #fff;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 16px;
        }

        #sendBtn:hover { box-shadow: 0 0 14px var(--accent-glow); }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .modal-title {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        .modal input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
        }

        .modal input:focus { border-color: var(--accent); }
        .modal input::placeholder { color: var(--muted); }

        .modal-user-result {
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            display: none;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .modal-user-result:hover { border-color: var(--accent); }
        .modal-user-result.visible { display: flex; }
        .modal-user-result img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }

        .modal-btn-row { display: flex; gap: 8px; }

        .modal-btn-row button:first-child {
            flex: 1;
            background: var(--accent);
            color: #fff;
        }

        .modal-btn-row button:last-child {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .modal-btn-row button:last-child:hover { border-color: var(--red); color: var(--red); }

        .error-msg {
            font-size: 12px;
            color: var(--red);
            display: none;
        }

        .error-msg.visible { display: block; }
    </style>
</head>
<body>

<header>
    <h1>BaaS</h1>
    <span>// private messages</span>
</header>

<!-- AUTH PANEL -->
<div class="panel" id="authPanel">
    <div class="panel-title">Authentication</div>
    <div id="loggedOut">
        <button id="loginBtn">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
            Войти через Google
        </button>
    </div>
    <div id="loggedIn" style="display:none;">
        <div class="auth-bar">
            <img id="userPhoto" class="user-avatar" src="" alt="Avatar">
            <div class="user-name" id="userName"></div>
            <button id="logoutBtn">✕ Выйти</button>
        </div>
    </div>
</div>

<!-- MESSENGER -->
<div class="messenger" id="messenger">
    <div class="messenger-inner">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">Диалоги</div>
            <div class="sidebar-search">
                <input type="text" id="contactSearch" placeholder="Поиск...">
            </div>
            <div class="contacts-list" id="contactsList">
                <div class="no-contacts">Нет диалогов</div>
            </div>
            <div class="new-chat-btn">
                <button id="newChatBtn">+ Новый диалог</button>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div class="chat-area" id="chatArea">
            <div class="no-chat-selected" id="noChatSelected">
                <div class="icon">💬</div>
                <p>Выберите диалог</p>
                <span>или начните новый</span>
            </div>

            <!-- Active chat (hidden until selected) -->
            <div id="activeChat" style="display:none; flex-direction:column; height:100%;">
                <div class="chat-header">
                    <div id="chatHeaderAvatar"></div>
                    <div>
                        <div class="chat-header-name" id="chatHeaderName">—</div>
                        <div class="chat-header-email" id="chatHeaderEmail">—</div>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-empty">
                        Начните переписку!
                        <span>сообщения появятся здесь</span>
                    </div>
                </div>
                <div class="chat-input-bar">
                    <input type="text" id="msgInput" placeholder="Ваше сообщение...">
                    <button id="sendBtn">➤</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- NEW CHAT MODAL -->
<div class="modal-overlay" id="newChatModal">
    <div class="modal">
        <div class="modal-title">Новый диалог</div>
        <input type="email" id="searchEmail" placeholder="Email пользователя...">
        <div class="error-msg" id="searchError">Пользователь не найден</div>
        <div class="modal-user-result" id="foundUser">
            <img id="foundUserPhoto" src="" alt="">
            <div>
                <div id="foundUserName" style="font-weight:600;font-size:13px;"></div>
                <div id="foundUserEmail" style="font-size:11px;color:var(--muted);"></div>
            </div>
        </div>
        <div class="modal-btn-row">
            <button id="startChatBtn" disabled>Открыть чат</button>
            <button id="cancelModalBtn">Отмена</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
        getFirestore, collection, addDoc, query, orderBy, onSnapshot,
        serverTimestamp, doc, setDoc, getDoc, getDocs, where,
        updateDoc, limit
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import {
        getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    // ── SAME FIREBASE CONFIG ──────────────────────────────────────────────
    const firebaseConfig = {
        apiKey: "AIzaSyCh90XrGHx08ElQ5hsUN4SXZOnVJTSwzVo",
        authDomain: "myproject-4f292.firebaseapp.com",
        projectId: "myproject-4f292",
        storageBucket: "myproject-4f292.firebasestorage.app",
        messagingSenderId: "715831246395",
        appId: "1:715831246395:web:f0b253fdcd64ec9199a61e",
        measurementId: "G-6E10ED09KQ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ── AUTH ──────────────────────────────────────────────────────────────
    document.getElementById('loginBtn').onclick = () =>
        signInWithPopup(auth, provider).catch(e => alert("Login error: " + e.message));

    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    let currentUser = null;
    let unsubMessages = null;
    let unsubConversations = null;
    let activeConversationId = null;
    let foundUserData = null;

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user) {
            document.getElementById('loggedOut').style.display = 'none';
            document.getElementById('loggedIn').style.display = 'block';
            document.getElementById('userPhoto').src = user.photoURL || '';
            document.getElementById('userName').textContent = user.displayName;
            document.getElementById('messenger').style.display = 'block';

            // Save/update user profile in Firestore
            await setDoc(doc(db, "users", user.uid), {
                uid: user.uid,
                name: user.displayName,
                email: user.email,
                photo: user.photoURL || '',
                lastSeen: serverTimestamp()
            }, { merge: true });

            loadConversations();
        } else {
            document.getElementById('loggedOut').style.display = 'block';
            document.getElementById('loggedIn').style.display = 'none';
            document.getElementById('messenger').style.display = 'none';
            if (unsubConversations) unsubConversations();
            if (unsubMessages) unsubMessages();
        }
    });

    // ── LOAD CONVERSATIONS ─────────────────────────────────────────────────
    function loadConversations() {
        if (unsubConversations) unsubConversations();

        const q = query(
            collection(db, "conversations"),
            where("participants", "array-contains", currentUser.uid),
            orderBy("lastMessageAt", "desc")
        );

        unsubConversations = onSnapshot(q, async (snapshot) => {
            const list = document.getElementById('contactsList');
            const searchVal = document.getElementById('contactSearch').value.toLowerCase();

            if (snapshot.empty) {
                list.innerHTML = '<div class="no-contacts">Нет диалогов</div>';
                return;
            }

            list.innerHTML = '';
            const items = [];

            for (const d of snapshot.docs) {
                const data = d.data();
                const otherId = data.participants.find(id => id !== currentUser.uid);
                const otherUser = data.participantData?.[otherId] || {};

                if (searchVal && !otherUser.name?.toLowerCase().includes(searchVal)) continue;

                items.push({ id: d.id, data, otherId, otherUser });
            }

            if (items.length === 0) {
                list.innerHTML = '<div class="no-contacts">Ничего не найдено</div>';
                return;
            }

            for (const { id, data, otherUser } of items) {
                const el = document.createElement('div');
                el.className = 'contact-item' + (id === activeConversationId ? ' active' : '');
                el.dataset.convId = id;

                const avatarHtml = otherUser.photo
                    ? `<img class="contact-avatar" src="${otherUser.photo}" alt="">`
                    : `<div class="contact-avatar-placeholder">${(otherUser.name || '?')[0].toUpperCase()}</div>`;

                el.innerHTML = `
                    ${avatarHtml}
                    <div class="contact-info">
                        <div class="contact-name">${escHtml(otherUser.name || '—')}</div>
                        <div class="contact-preview">${escHtml(data.lastMessage || 'Начните чат')}</div>
                    </div>
                `;

                el.onclick = () => openConversation(id, otherUser);
                list.appendChild(el);
            }
        });
    }

    document.getElementById('contactSearch').addEventListener('input', loadConversations);

    // ── OPEN CONVERSATION ──────────────────────────────────────────────────
    function openConversation(convId, otherUser) {
        activeConversationId = convId;

        // Update sidebar active state
        document.querySelectorAll('.contact-item').forEach(el => {
            el.classList.toggle('active', el.dataset.convId === convId);
        });

        // Show chat area
        document.getElementById('noChatSelected').style.display = 'none';
        const activeChat = document.getElementById('activeChat');
        activeChat.style.display = 'flex';

        // Set header
        document.getElementById('chatHeaderName').textContent = otherUser.name || '—';
        document.getElementById('chatHeaderEmail').textContent = otherUser.email || '—';

        const avatarEl = document.getElementById('chatHeaderAvatar');
        if (otherUser.photo) {
            avatarEl.innerHTML = `<img class="chat-header-avatar" src="${otherUser.photo}" alt="">`;
        } else {
            avatarEl.innerHTML = `<div class="chat-header-placeholder">${(otherUser.name || '?')[0].toUpperCase()}</div>`;
        }

        // Load messages
        if (unsubMessages) unsubMessages();

        const q = query(
            collection(db, "conversations", convId, "messages"),
            orderBy("timestamp", "asc")
        );

        unsubMessages = onSnapshot(q, (snapshot) => {
            const container = document.getElementById('chatMessages');

            if (snapshot.empty) {
                container.innerHTML = `
                    <div class="chat-empty">
                        Начните переписку!
                        <span>сообщения появятся здесь</span>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            snapshot.forEach(d => {
                const msg = d.data();
                const isOut = msg.senderId === currentUser.uid;
                const time = msg.timestamp?.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) || '';

                const bubble = document.createElement('div');
                bubble.className = `msg-bubble ${isOut ? 'out' : 'in'}`;
                bubble.innerHTML = `
                    ${escHtml(msg.text)}
                    <div class="msg-time">${time}</div>
                `;
                container.appendChild(bubble);
            });

            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        });
    }

    // ── SEND MESSAGE ───────────────────────────────────────────────────────
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('msgInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    async function sendMessage() {
        if (!activeConversationId || !currentUser) return;
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';

        try {
            const messagesRef = collection(db, "conversations", activeConversationId, "messages");
            await addDoc(messagesRef, {
                text,
                senderId: currentUser.uid,
                senderName: currentUser.displayName,
                timestamp: serverTimestamp()
            });

            // Update conversation last message
            await updateDoc(doc(db, "conversations", activeConversationId), {
                lastMessage: text,
                lastMessageAt: serverTimestamp()
            });
        } catch (e) {
            alert("Ошибка отправки: " + e.message);
        }
    }

    // ── NEW CHAT MODAL ─────────────────────────────────────────────────────
    document.getElementById('newChatBtn').onclick = () => {
        document.getElementById('newChatModal').classList.add('open');
        document.getElementById('searchEmail').value = '';
        document.getElementById('foundUser').classList.remove('visible');
        document.getElementById('searchError').classList.remove('visible');
        document.getElementById('startChatBtn').disabled = true;
        foundUserData = null;
    };

    document.getElementById('cancelModalBtn').onclick = () => {
        document.getElementById('newChatModal').classList.remove('open');
    };

    // Search user by email
    document.getElementById('searchEmail').addEventListener('input', async (e) => {
        const email = e.target.value.trim().toLowerCase();
        const errorEl = document.getElementById('searchError');
        const foundEl = document.getElementById('foundUser');
        const startBtn = document.getElementById('startChatBtn');

        foundEl.classList.remove('visible');
        errorEl.classList.remove('visible');
        startBtn.disabled = true;
        foundUserData = null;

        if (!email || !email.includes('@')) return;

        try {
            const q = query(collection(db, "users"), where("email", "==", email), limit(1));
            const snap = await getDocs(q);

            if (snap.empty || snap.docs[0].id === currentUser.uid) {
                errorEl.classList.add('visible');
                return;
            }

            const userData = snap.docs[0].data();
            foundUserData = userData;

            document.getElementById('foundUserPhoto').src = userData.photo || '';
            document.getElementById('foundUserName').textContent = userData.name;
            document.getElementById('foundUserEmail').textContent = userData.email;
            foundEl.classList.add('visible');
            startBtn.disabled = false;
        } catch (e) {
            console.error(e);
        }
    });

    document.getElementById('startChatBtn').onclick = async () => {
        if (!foundUserData) return;

        // Check if conversation already exists
        const convId = [currentUser.uid, foundUserData.uid].sort().join('_');
        const convRef = doc(db, "conversations", convId);
        const existing = await getDoc(convRef);

        if (!existing.exists()) {
            await setDoc(convRef, {
                participants: [currentUser.uid, foundUserData.uid],
                participantData: {
                    [currentUser.uid]: {
                        name: currentUser.displayName,
                        email: currentUser.email,
                        photo: currentUser.photoURL || ''
                    },
                    [foundUserData.uid]: {
                        name: foundUserData.name,
                        email: foundUserData.email,
                        photo: foundUserData.photo || ''
                    }
                },
                lastMessage: '',
                lastMessageAt: serverTimestamp()
            });
        }

        document.getElementById('newChatModal').classList.remove('open');
        openConversation(convId, foundUserData);
    };

    // ── UTILS ──────────────────────────────────────────────────────────────
    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }
</script>
</body>
</html>
